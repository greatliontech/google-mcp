name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  GO_VERSION: "1.25"

jobs:
  semrel:
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.check.outputs.released }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: greatliontech/semrel@main
        id: semrel

      - name: Check for release
        id: check
        run: |
          CURRENT="${{ steps.semrel.outputs.current-version }}"
          NEXT="${{ steps.semrel.outputs.next-version }}"

          echo "Current: $CURRENT"
          echo "Next: $NEXT"

          if [ "$CURRENT" = "$NEXT" ]; then
            echo "No release needed"
            echo "released=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "released=true" >> $GITHUB_OUTPUT
          echo "version=$NEXT" >> $GITHUB_OUTPUT

      - name: Create draft release
        if: steps.check.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.check.outputs.version }}
          semrel release --notes-only | gh release create "v${VERSION}" \
            --target ${{ github.sha }} \
            --title "v${VERSION}" \
            --notes-file - \
            --draft

  build:
    needs: semrel
    if: needs.semrel.outputs.released == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=${{ needs.semrel.outputs.version }}
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".exe"
          fi
          go build -ldflags="-s -w -X main.version=${VERSION}" -o dist/google-mcp${EXT} .

      - name: Create archive
        run: |
          VERSION=${{ needs.semrel.outputs.version }}
          mkdir -p release
          if [ "${{ matrix.goos }}" = "windows" ]; then
            cp dist/google-mcp.exe release/
            cd release && zip ../google-mcp_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}.zip *
          else
            cp dist/google-mcp release/
            cd release && tar -czvf ../google-mcp_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz *
          fi

      - name: Upload archive to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ needs.semrel.outputs.version }}
          ARCHIVE=$(ls google-mcp_${VERSION}_*.tar.gz google-mcp_${VERSION}_*.zip 2>/dev/null)
          gh release upload "v${VERSION}" $ARCHIVE --clobber

  publish:
    needs: [semrel, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.GLT_RELEASER_APP_ID }}
          private-key: ${{ secrets.GLT_RELEASER_APP_KEY }}

      - name: Publish release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION=${{ needs.semrel.outputs.version }}
          gh release edit "v${VERSION}" --draft=false --repo ${{ github.repository }}
